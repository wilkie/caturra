packages:
  - packages/*
  - apps/*

allowBuilds:
  # wasm-pack's postinstall downloads its prebuilt binary.
  wasm-pack: true

catalog:
  '@types/node': ^22
  typescript: ^6.0.3
  vite: ^8.1.3
  vitest: ^4.1.9
  '@playwright/test': ^1.61.1
  eslint: ^10.6.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.62.1
  eslint-config-prettier: ^10.1.8
  prettier: ^3.9.4
  wasm-pack: ^0.15.0

minimumReleaseAgeExclude:
  - vite@8.1.3
