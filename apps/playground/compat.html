<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>caturra — Java compatibility</title>
    <meta
      name="description"
      content="What of Java 11 caturra implements, proved by programs you can run in the browser and compare against a real JDK."
    />
    <script>
      // Cross-origin isolation for SharedArrayBuffer (see index.html) — the engine
      // is the same one the playground runs, so it wants the same headers.
      if (!/^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname)) {
        const s = document.createElement('script');
        s.src = '%BASE_URL%coi-serviceworker.js';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/compat/main.tsx"></script>
  </body>
</html>
