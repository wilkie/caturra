<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jvmjs playground</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <h1>jvmjs playground</h1>
      <span id="engine-version" data-testid="engine-version"></span>
    </header>
    <main>
      <section class="editor-pane">
        <label>Main.java <span class="hint">(click a line number to set a breakpoint)</span></label>
        <div id="source" data-testid="source"></div>
        <label for="stdin">Program input (one line per Scanner read)</label>
        <textarea id="stdin" data-testid="stdin" rows="3" spellcheck="false"></textarea>
        <div class="run-row">
          <button id="run" data-testid="run" disabled>Compile &amp; Run</button>
          <button id="debug" data-testid="debug" disabled>Debug</button>
        </div>
      </section>
      <section class="console-pane">
        <div id="debug-bar" data-testid="debug-bar" hidden>
          <button id="resume" data-testid="resume">Continue</button>
          <button id="step-over" data-testid="step-over">Step Over</button>
          <button id="step-into" data-testid="step-into">Step Into</button>
          <button id="step-out" data-testid="step-out">Step Out</button>
          <button id="stop" data-testid="stop">Stop</button>
        </div>
        <div id="paused-view" data-testid="paused-view" hidden>
          <label>Paused</label>
          <pre id="frames" data-testid="frames"></pre>
        </div>
        <label for="console">Console</label>
        <pre id="console" data-testid="console"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
