      name="description"

    <script>
      // Cross-origin isolation for SharedArrayBuffer (see index.html) — the engine
      // is the same one the playground runs, so it wants the same headers.
      if (!/^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname)) {
        const s = document.createElement('script');
        s.src = '/caturra/coi-serviceworker.js';
        document.head.appendChild(s);
      }
    </script>
    <script type="module" crossorigin src="/caturra/assets/compat-BQKKn1mN.js"></script>
